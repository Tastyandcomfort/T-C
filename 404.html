<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Tasty & Comfort</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: #1c1c1e;
            max-width: 450px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            box-sizing: border-box;
        }

        .animation-box {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
        }

        .animation-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: transparent;
            border: none;
            }
        h1 {
            color: #ffb703;
            font-size: 48px;
            margin-bottom: 10px;
        }
        p {
            color: #aaa;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #ffb703;
            color: #121212;
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Clean vector-style tech glitch / loading indicator -->
        <div class="animation-box">
            <img src="0cc97f69-41fe-4344-80ca-6668201e80fb-ezgif.com-crop.gif" alt="Cute dog animation" style="width: 100%; max-width: 250px;">
    </div>
    <div class="container">
        <h1>404</h1>
        <h3>Page Not Found</h3>
        <p>Oops! The page you are looking for doesn't exist, has been moved, or the server connection encountered an issue.</p>
        <a href="index.html" class="btn">Back to Home</a>
    </div>

</body>
</html>
